# Production Environment Configuration
# All sensitive values come from environment variables — never hardcoded.

environment: prod
debug: false

host: 0.0.0.0
port: 8000
workers: 8  # tune to CPU cores

database:
  host: ${DB_HOST}
  port: 5432
  database: ${DB_NAME}
  username: ${DB_USER}
  password: ${DB_PASSWORD}
  pool_size: 50
  max_overflow: 20
  echo: false

redis:
  host: ${REDIS_HOST}
  port: 6379
  db: 0
  password: ${REDIS_PASSWORD}
  max_connections: 100

rabbitmq:
  host: ${RABBITMQ_HOST}
  port: 5672
  username: ${RABBITMQ_USER}
  password: ${RABBITMQ_PASSWORD}
  vhost: /rcs-prod
  prefetch_count: 20
  heartbeat: 60

# rcssms.in aggregator — all three required for real sends
# Set RCS_USERNAME, RCS_PASSWORD, RCS_ID, RCS_CLIENT_SECRET in environment
# FIX: removed Gupshup block; default_aggregator changed from gupshup → rcssms
default_aggregator: rcssms
use_mock_aggregator: false  # NEVER true in production

observability:
  enable_metrics: true
  metrics_port: 9090
  enable_tracing: true
  jaeger_endpoint: ${JAEGER_ENDPOINT}
  otel_service_name: rcs-platform-prod
  log_level: INFO
  log_format: json

rate_limit:
  enabled: true
  default_limit: 100   # requests per minute per tenant
  rcssms_limit: 1000   # messages per second

retry:
  max_retries: 3
  retry_backoff: 60    # seconds between retries
  enable_fallback: true
  fallback_delay: 300  # 5 minutes
  dlq_retention: 30    # days

security:
  secret_key: ${SECRET_KEY}     # MUST be a strong random value in prod
  jwt_algorithm: HS256
  access_token_expire_minutes: 30
  api_key_header: X-API-Key
  cors_origins:
    - https://app.yourdomain.com
    - https://dashboard.yourdomain.com

queue_names:
  campaign_orchestrator: campaign.orchestrator
  message_dispatcher:    message.dispatch
  fallback_handler:      message.fallback
  webhook_processor:     webhook.process
